name: Docker Build & Push

# Thin orchestrator. The actual build/push and tag-cleanup live in reusable
# sub-workflows (_docker-build-and-publish.yml, _docker-cleanup.yml).
#
#   prepare  -> compute config + gate scheduled builds on upstream changes
#   build    -> build/push the selected variant(s)
#   build-glm-> rebuild dev-glm on top of the freshly built dev (schedule only)
#   cleanup  -> prune old timestamped dev tags (schedule only)

on:
  push:
    branches:
      - main
    paths:
      - 'docker/Dockerfile'

  schedule:
    # Every 12 hours: midnight and noon UTC
    - cron: '0 0,12 * * *'

  workflow_dispatch:
    inputs:
      variant:
        description: 'Build variant'
        required: true
        type: choice
        options:
          - primary
          - cu129-arm64
          - cu13-arm64
          - dev-glm
          - debug
      image_tag:
        description: 'Tag mode: latest, dev (rolling + timestamped), or custom'
        required: true
        type: choice
        options:
          - dev
          - latest
          - custom
      custom_tag:
        description: 'Custom tag name (only used when image_tag is custom)'
        required: false
        default: ''
        type: string
      dockerfile:
        description: 'Path to Dockerfile (e.g. docker/Dockerfile)'
        required: false
        default: 'docker/Dockerfile'
        type: string
      image_repo:
        description: 'Docker Hub repo to push to (use radixark/miles-staging to test the workflow)'
        required: false
        default: 'radixark/miles'
        type: string
      simulate_schedule:
        description: '[DEBUG] Simulate a scheduled build (runs upstream check, retag, glm, but not prune)'
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}-${{ inputs.image_repo || 'radixark/miles' }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.config.outputs.should_build }}
      variants: ${{ steps.config.outputs.variants }}
      image_tag: ${{ steps.config.outputs.image_tag }}
      custom_tag: ${{ steps.config.outputs.custom_tag }}
      dockerfile: ${{ steps.config.outputs.dockerfile }}
      image_repo: ${{ steps.config.outputs.image_repo }}
      retag_latest: ${{ steps.config.outputs.retag_latest }}
      build_glm: ${{ steps.config.outputs.build_glm }}
      prune: ${{ steps.config.outputs.prune }}
    steps:
      - name: Restore last known upstream SHAs
        if: github.event_name == 'schedule' || inputs.simulate_schedule == true
        uses: actions/cache/restore@v4
        with:
          path: last_upstream_shas.txt
          key: upstream-shas-
          restore-keys: upstream-shas-

      - name: Compute build configuration
        id: config
        run: |
          EVENT="${{ github.event_name }}"
          SIMULATE="${{ inputs.simulate_schedule }}"

          # schedule-like = real schedule OR a simulated-schedule dispatch
          SCHEDULE_LIKE=false
          if [ "$EVENT" = "schedule" ] || [ "$SIMULATE" = "true" ]; then
            SCHEDULE_LIKE=true
          fi

          # ---- Upstream-change gate (schedule-like only) ----
          SHOULD_BUILD=true
          if [ "$SCHEDULE_LIKE" = "true" ]; then
            SHOULD_BUILD=false

            SGLANG_SHA=$(curl -s -H "Accept: application/vnd.github.sha" \
              "https://api.github.com/repos/sgl-project/sglang/commits/sglang-miles")
            MEGATRON_SHA=$(curl -s -H "Accept: application/vnd.github.sha" \
              "https://api.github.com/repos/NVIDIA/Megatron-LM/commits/main")

            echo "sglang HEAD:   ${SGLANG_SHA}"
            echo "megatron HEAD: ${MEGATRON_SHA}"

            CACHE_FILE="last_upstream_shas.txt"
            if [ -f "$CACHE_FILE" ]; then
              LAST_SGLANG=$(sed -n '1p' "$CACHE_FILE")
              LAST_MEGATRON=$(sed -n '2p' "$CACHE_FILE")
            else
              LAST_SGLANG=""
              LAST_MEGATRON=""
            fi

            if [ "$SGLANG_SHA" != "$LAST_SGLANG" ] || [ "$MEGATRON_SHA" != "$LAST_MEGATRON" ]; then
              SHOULD_BUILD=true
              echo "Upstream change detected"
            else
              echo "No upstream changes"
            fi

            echo "${SGLANG_SHA}" > "$CACHE_FILE"
            echo "${MEGATRON_SHA}" >> "$CACHE_FILE"
          fi

          # ---- Variant(s) / tag config ----
          if [ "$EVENT" = "workflow_dispatch" ]; then
            VARIANTS="[\"${{ inputs.variant }}\"]"
            IMAGE_TAG="${{ inputs.image_tag }}"
            CUSTOM_TAG="${{ inputs.custom_tag }}"
            DOCKERFILE="${{ inputs.dockerfile }}"
            IMAGE_REPO="${{ inputs.image_repo }}"
          else
            # schedule / push-to-main: rolling dev build of primary
            VARIANTS='["primary"]'
            IMAGE_TAG="dev"
            CUSTOM_TAG=""
            DOCKERFILE="docker/Dockerfile"
            IMAGE_REPO="radixark/miles"
          fi

          # ---- Post-build actions ----
          RETAG_LATEST=$SCHEDULE_LIKE
          BUILD_GLM=$SCHEDULE_LIKE
          PRUNE=false
          if [ "$EVENT" = "schedule" ]; then
            PRUNE=true
          fi

          {
            echo "should_build=${SHOULD_BUILD}"
            echo "variants=${VARIANTS}"
            echo "image_tag=${IMAGE_TAG}"
            echo "custom_tag=${CUSTOM_TAG}"
            echo "dockerfile=${DOCKERFILE}"
            echo "image_repo=${IMAGE_REPO}"
            echo "retag_latest=${RETAG_LATEST}"
            echo "build_glm=${BUILD_GLM}"
            echo "prune=${PRUNE}"
          } >> "$GITHUB_OUTPUT"

      - name: Save upstream SHAs to cache
        if: (github.event_name == 'schedule' || inputs.simulate_schedule == true) && steps.config.outputs.should_build == 'true'
        uses: actions/cache/save@v4
        with:
          path: last_upstream_shas.txt
          key: upstream-shas-${{ github.run_id }}

  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    strategy:
      matrix:
        variant: ${{ fromJSON(needs.prepare.outputs.variants) }}
    uses: ./.github/workflows/_docker-build-and-publish.yml
    with:
      variant: ${{ matrix.variant }}
      image_tag: ${{ needs.prepare.outputs.image_tag }}
      custom_tag: ${{ needs.prepare.outputs.custom_tag }}
      dockerfile: ${{ needs.prepare.outputs.dockerfile }}
      image_repo: ${{ needs.prepare.outputs.image_repo }}
      push: true
      retag_latest: ${{ needs.prepare.outputs.retag_latest == 'true' }}
    secrets: inherit

  build-glm:
    needs: [prepare, build]
    if: needs.build.result == 'success' && needs.prepare.outputs.build_glm == 'true'
    uses: ./.github/workflows/_docker-build-and-publish.yml
    with:
      variant: dev-glm
      image_tag: dev
      image_repo: ${{ needs.prepare.outputs.image_repo }}
      push: true
      retag_latest: false
    secrets: inherit

  cleanup:
    needs: [prepare, build]
    if: needs.build.result == 'success' && needs.prepare.outputs.prune == 'true'
    uses: ./.github/workflows/_docker-cleanup.yml
    with:
      image: ${{ needs.prepare.outputs.image_repo }}
      tag_pattern: '^dev-[0-9]{12}$'
      keep: 20
    secrets: inherit
