apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: ycy-miles-cpu-dind-job #必须填写，任务的名字，用户自定义
  namespace: nlp-train
  # annotations:
  #   k8s.v1.cni.cncf.io/networks: hostdev-net
spec:
  slotsPerWorker: 8
  runPolicy:
    cleanPodPolicy: Running
  sshAuthMountPath: /home/yangchengyi/.ssh  #,必须填写，做普通用户免密钥的时候用到，格式为 /home/自己的 ldap 名字/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          dnsConfig:
            nameservers:
            - 223.5.5.5
            - 114.114.114.114
          containers:
          - image: harbor.unisound.ai/unisound/harbor_ycy:latest
            lifecycle:
               postStart:
                exec:
                 command:
                 - /bin/bash
                 - -c
                 - /etc/init.d/ssh start; /usr/local/bin/init-home-symlinks.sh
            securityContext:
              privileged: false
            name: mpi-launcher
            command:
            - /bin/bash
            - -c
            args:
            - sleep 28d  # 这里执行你的任务脚本，支持uniscale_ift, uniscale_dpo等launch - worker模式的任务
            env:
            - name: http_proxy
              value: ""
            - name: HARBOR_TASKS_DIR
              value: "/fs/nlp-intern/yangchengyi/harbor/datasets"
            - name: https_proxy
              value: ""
            - name: HTTP_PROXY
              value: ""
            - name: HTTPS_PROXY
              value: ""
            - name: no_proxy
              value: localhost,127.0.0.1,::1
            - name: NO_PROXY
              value: localhost,127.0.0.1,::1
            # - name: http_proxy
            #   value: "http://10.10.20.200:3129"
            # - name: https_proxy
            #   value: "http://10.10.20.200:3129"
            # - name: HTTP_PROXY
            #   value: "http://10.10.20.200:3129"
            # - name: HTTPS_PROXY
            #   value: "http://10.10.20.200:3129"
            # - name: no_proxy
            #   value: 172.31.72.17,182.242.159.76,172.19.12.23:48081,0.0.0.0,localhost,127.0.0.1
            # - name: NO_PROXY
            #   value: 172.31.72.17,182.242.159.76,172.19.12.23:48081,0.0.0.0,localhost,127.0.0.1
            # - name: UV_INDEX_URL
            #   value: http://172.31.72.17:48081/repository/pypi-proxy/simple
            # - name: UV_INSECURE_HOST
            #   value: 172.31.72.17:48081
            # - name: UV_PYTHON_INSTALL_MIRROR
            #   value: https://ghfast.top/https://github.com/astral-sh/python-build-standalone/releases/download
            # - name: PIP_INDEX_URL
            #   value: http://172.31.72.17:48081/repository/pypi-proxy/simple
            # - name: PIP_TRUSTED_HOST
            #   value: 172.31.72.17:48081
            # - name: npm_config_registry
            #   value: http://172.31.72.17:48081/repository/npm-proxy
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DATA_LINK_SRC
              value: "/fs/nlp-intern/yangchengyi" # 与调试机 ~/data 软链目标一致，供 init-home-symlinks.sh 使用
            volumeMounts:
            - mountPath: /fs #必须填写，对应调试机的目录
              name: jfs
            - name: home
              mountPath: /home/yangchengyi #必须填写，对应调试机的目录
            # - mountPath: /var/run/docker.sock
            #   name: dockersock
            # - mountPath: /usr/sbin/docker
            #   name: dockerbin
            # - mountPath: /usr/libexec/docker/cli-plugins
            #   name: docker-plugin
          volumes:
          - name: jfs
            hostPath:
              path: /fs #必须填写，对应调试机的目录
          - name: home
            hostPath:
              path: /home/yangchengyi #必须填写，对应运行 Pod 的节点上的家目录
          # - mountPath: /home/yangchengyi #必须填写，对应调试机的目录
          #   name: home
          # - name: dockersock
          #   hostPath:
          #     path: /var/run/docker.sock
          # - name: dockerbin
          #   hostPath:
          #     path: /usr/sbin/docker
          # - name: docker-plugin
          #   hostPath:
          #     path: /usr/libexec/docker/cli-plugins

    Worker:
      replicas: 1 #必须填写，分布式训练的节点数量，单节点就写1 ，2 个节点就写 2
      template:
        metadata:
          labels:
            slime-group: colocate
        spec:
          dnsConfig:
            nameservers:
            - 223.5.5.5
            - 114.114.114.114
          containers:
          - image: harbor.unisound.ai/unisound/harbor_ycy:latest
            lifecycle:
              postStart:
                exec:
                 command:
                 - /bin/bash
                 - -c
                 - /etc/init.d/ssh start; /usr/local/bin/init-home-symlinks.sh
            securityContext:  # 特权模式
              privileged: true
            command: ["/bin/sh","-c"]
            args:
            - sleep 28d
              

            name: mpi-worker
            env:
            - name: http_proxy
              value: ""
            - name: HARBOR_TASKS_DIR
              value: "/fs/nlp-intern/yangchengyi/harbor/datasets"
            - name: https_proxy
              value: ""
            - name: HTTP_PROXY
              value: ""
            - name: HTTPS_PROXY
              value: ""
            - name: no_proxy
              value: localhost,127.0.0.1,::1
            - name: NO_PROXY
              value: localhost,127.0.0.1,::1
            # - name: http_proxy
            #   value: "http://10.10.20.200:3129"
            # - name: https_proxy
            #   value: "http://10.10.20.200:3129"
            # - name: HTTP_PROXY
            #   value: "http://10.10.20.200:3129"
            # - name: HTTPS_PROXY
            #   value: "http://10.10.20.200:3129"
            # - name: no_proxy
            #   value: 172.31.72.17,182.242.159.76,172.19.12.23:48081,0.0.0.0,localhost,127.0.0.1
            # - name: NO_PROXY
            #   value: 172.31.72.17,182.242.159.76,172.19.12.23:48081,0.0.0.0,localhost,127.0.0.1
            # - name: UV_INDEX_URL
            #   value: http://172.31.72.17:48081/repository/pypi-proxy/simple
            # - name: UV_INSECURE_HOST
            #   value: 172.31.72.17:48081
            # - name: UV_PYTHON_INSTALL_MIRROR
            #   value: https://ghfast.top/https://github.com/astral-sh/python-build-standalone/releases/download
            # - name: PIP_INDEX_URL
            #   value: http://172.31.72.17:48081/repository/pypi-proxy/simple
            # - name: PIP_TRUSTED_HOST
            #   value: 172.31.72.17:48081
            # - name: npm_config_registry
            #   value: http://172.31.72.17:48081/repository/npm-proxy
            - name: DATA_LINK_SRC
              value: "/fs/nlp-intern/yangchengyi" # 与调试机 ~/data 软链目标一致，供 init-home-symlinks.sh 使用
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            resources:
              limits:
                cpu: 16
                # nvidia.com/gpu: 0 #必须填写，每个节点使用的 GPU 的数量
                memory: 500Gi #平时任务使用500G，如果使用cpu-offsoad可以根据自己的需求调大一些，不能超过900G
            volumeMounts:
            - mountPath: /fs #必须填写，对应调试机的目录
              name: jfs
            - name: dshm
              mountPath: /dev/shm
            - name: home
              mountPath: /home/yangchengyi #必须填写，对应调试机的目录（与 Launcher 一致）
            # - mountPath: /var/run/docker.sock
            #   name: dockersock
            # - mountPath: /usr/sbin/docker
            #   name: dockerbin
            # - mountPath: /usr/libexec/docker/cli-plugins
            #   name: docker-plugin
          volumes:
          - name: jfs
            hostPath:
              path: /fs #必须填写，对应调试机的目录
          - name: home
            hostPath:
              path: /home/yangchengyi #必须填写，对应运行 Pod 的节点上的家目录
          - name: dshm
            emptyDir: { medium: Memory, sizeLimit: 64Gi }
          # - name: dockersock
          #   hostPath:
          #     path: /var/run/docker.sock
          # - name: dockerbin
          #   hostPath:
          #     path: /usr/sbin/docker
          # - name: docker-plugin
          #   hostPath:
          #     path: /usr/libexec/docker/cli-plugins
