apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: ycy-miles-agent-job #必须填写，任务的名字，用户自定义
  namespace: nlp-train
  annotations:
    k8s.v1.cni.cncf.io/networks: hostdev-net
spec:
  slotsPerWorker: 8
  runPolicy:
    cleanPodPolicy: Running
  sshAuthMountPath: /home/yangchengyi/.ssh  #,必须填写，做普通用户免密钥的时候用到，格式为 /home/自己的 ldap 名字/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          # 不要覆盖 nameservers 为公网 DNS，否则无法解析 agent-env / miles-session 等 *.svc.cluster.local
          containers:
          - image: harbor.unisound.ai/unisound/miles_ycy:latest
            lifecycle:
               postStart:
                exec:
                 command:
                 - /bin/bash
                 - -c
                 - /etc/init.d/ssh start; /usr/local/bin/init-home-symlinks.sh
            securityContext:
              privileged: false
            name: mpi-launcher
            command:
            - /bin/bash
            - -c
            args:
            - sleep 28d  # 占位挂 Pod；正式任务可改为 bash -c '...; exec sleep 28d' 或 kubectl exec 内执行
            env:
            - name: http_proxy
              value: ""
            - name: https_proxy
              value: ""
            - name: HTTP_PROXY
              value: ""
            - name: HTTPS_PROXY
              value: ""
            - name: no_proxy
              value: localhost,127.0.0.1,::1
            - name: NO_PROXY
              value: localhost,127.0.0.1,::1
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DATA_LINK_SRC
              value: "/fs/nlp-intern/yangchengyi" # 与调试机 ~/data 软链目标一致，供 init-home-symlinks.sh 使用
            # 方案 A：Harbor agent 通过 Service DNS 访问 session-server（见文件末尾 miles-session Service）
            - name: MILES_ROUTER_EXTERNAL_HOST
              value: miles-session.nlp-train.svc.cluster.local
            - name: AGENT_SERVER_URL
              value: http://houjue-harbor-server-ycy.nlp-intern.svc.cluster.local:11000
            - name: AGENT_MAX_CONCURRENT
              value: "64"
            - name: MILES_SCRIPT_EXTERNAL_RAY
              value: "true"
            - name: SLURM_JOB_NUM_NODES
              value: "2"
            volumeMounts:
            - mountPath: /fs #必须填写，对应调试机的目录
              name: jfs
            - mountPath: /home/yangchengyi #必须填写，与 Worker 一致，便于 cd 进 miles 目录
              name: home
            - mountPath: /var/run/docker.sock
              name: dockersock
            - mountPath: /usr/sbin/docker
              name: dockerbin
          volumes:
          - name: jfs
            hostPath:
              path: /fs #必须填写，对应调试机的目录
          - name: home
            hostPath:
              path: /home/yangchengyi #必须填写，对应运行 Pod 的节点上的家目录
          - name: dockersock
            hostPath:
              path: /var/run/docker.sock
          - name: dockerbin
            hostPath:
              path: /usr/sbin/docker
 
    Worker:
      replicas: 4 #必须填写，分布式训练的节点数量，单节点就写1 ，2 个节点就写 2
      template:
        metadata:
          labels:
            miles-group: colocate
            app: miles-session
        spec:
          # 使用集群默认 DNS，解析 agent-env / miles-session
          containers:
          - image: harbor.unisound.ai/unisound/miles_ycy:latest
            lifecycle:
              postStart:
                exec:
                 command:
                 - /bin/bash
                 - -c
                 - /etc/init.d/ssh start; /usr/local/bin/init-home-symlinks.sh
            securityContext:  # 特权模式
              privileged: true
            command: ["/bin/sh","-c"]
            args: [
                sleep 28d
            ]
            name: mpi-worker
            env:
            - name: http_proxy
              value: ""
            - name: https_proxy
              value: ""
            - name: HTTP_PROXY
              value: ""
            - name: HTTPS_PROXY
              value: ""
            - name: no_proxy
              value: localhost,127.0.0.1,::1
            - name: NO_PROXY
              value: localhost,127.0.0.1,::1
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: DATA_LINK_SRC
              value: "/fs/nlp-intern/yangchengyi" # 与调试机 ~/data 软链目标一致，供 init-home-symlinks.sh 使用
            - name: MILES_ROUTER_EXTERNAL_HOST
              value: miles-session.nlp-train.svc.cluster.local
            - name: AGENT_SERVER_URL
              value: http://houjue-harbor-server-ycy.nlp-intern.svc.cluster.local:11000
            - name: AGENT_MAX_CONCURRENT
              value: "64"
            - name: MILES_SCRIPT_EXTERNAL_RAY
              value: "true"
            - name: SLURM_JOB_NUM_NODES
              value: "2"
            resources:
              limits:
                cpu: 64
                nvidia.com/hostdev: 10   #如果是多机任务需要开启此参数
                nvidia.com/gpu: 8 #必须填写，每个节点使用的 GPU 的数量
                memory: 900Gi #平时任务使用500G，如果使用cpu-offsoad可以根据自己的需求调大一些，不能超过900G
            volumeMounts:
            - mountPath: /fs #必须填写，对应调试机的目录
              name: jfs
            - mountPath: /home/yangchengyi #必须填写，对应调试机的目录
              name: home
            - name: dshm
              mountPath: /dev/shm
            - mountPath: /var/run/docker.sock
              name: dockersock
            - mountPath: /usr/sbin/docker
              name: dockerbin
          volumes:
          - name: jfs
            hostPath:
              path: /fs #必须填写，对应调试机的目录
          - name: home
            hostPath:
              path: /home/yangchengyi #必须填写，对应运行 Pod 的节点上的家目录
          - name: dshm
            emptyDir: { medium: Memory, sizeLimit: 64Gi }
          - name: dockersock
            hostPath:
              path: /var/run/docker.sock
          - name: dockerbin
            hostPath:
              path: /usr/sbin/docker
---
# Session-server（训练 Pod worker-0 上 --session-server-port 30000）的集群内入口。
# MILES_ROUTER_EXTERNAL_HOST 把 Harbor agent 的 OpenAI base_url 指到这里。
# 请在 worker-0 上启动训练；session-server 随 RolloutManager 起在同一 Pod。
apiVersion: v1
kind: Service
metadata:
  name: miles-session
  namespace: nlp-train
spec:
  type: ClusterIP
  selector:
    training.kubeflow.org/job-name: ycy-miles-agent-job
    training.kubeflow.org/job-role: worker
    training.kubeflow.org/replica-index: "0"
  ports:
  - name: session
    port: 30000
    targetPort: 30000

