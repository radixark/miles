apiVersion: v1
kind: Pod
metadata:
  name: miles-v4-2604-test
  labels:
    app: miles-v4-test
spec:
  restartPolicy: Never
  nodeName: gke-gcp-radixark-02-a4x-260102-05-ec94d7c6-24wq
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "kubernetes.io/arch"
    operator: "Equal"
    value: "arm64"
    effect: "NoSchedule"
  hostPID: true
  imagePullSecrets:
  - name: yuemingy
  containers:
  - name: trainer
    image: yuemingy/miles-sunrise:gb300
    workingDir: /root
    command: ["/bin/bash", "-c"]
    args:
    - |
      echo "=== Miles V4 2604 Test Pod ==="
      echo "GPU count: $(python -c 'import torch; print(torch.cuda.device_count())' 2>/dev/null || echo 'N/A')"
      nvidia-smi -L 2>/dev/null || echo "nvidia-smi not available"
      sleep infinity
    env:
    - name: NCCL_DEBUG
      value: "WARN"
    - name: LD_LIBRARY_PATH
      value: /usr/local/nvidia/lib64
    - name: DSV4_CKPT_VERSION
      value: "2604"
    - name: SGLANG_DSV4_MODE
      value: "2604"
    - name: SGLANG_FIX_MTP_HC_HIDDEN
      value: "1"
    - name: SGLANG_OPT_DEEPGEMM_SCALE_CONVERT_AT_INIT
      value: "1"
    securityContext:
      privileged: true
      capabilities:
        add:
        - SYS_PTRACE
        - SYS_ADMIN
        - BPF
        - PERFMON
    volumeMounts:
    - name: cluster-public
      mountPath: /cluster_public
      subPath: shared_data
    - name: node-local
      mountPath: /root/models
    - name: root-cache
      mountPath: /root/.cache
    - name: dshm
      mountPath: /dev/shm
    - name: library-dir-host
      mountPath: /usr/local/nvidia
      readOnly: true
    - name: gib
      mountPath: /usr/local/gib
      readOnly: true
  volumes:
  - name: cluster-public
    persistentVolumeClaim:
      claimName: shared-data
  - name: node-local
    hostPath:
      path: /mnt/stateful_partition/kube-ephemeral-ssd/miles-v4-test
      type: DirectoryOrCreate
  - name: root-cache
    hostPath:
      path: /mnt/stateful_partition/kube-ephemeral-ssd/container-root-dot-cache
      type: DirectoryOrCreate
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: 128Gi
  - name: library-dir-host
    hostPath:
      path: /home/kubernetes/bin/nvidia
  - name: gib
    hostPath:
      path: /home/kubernetes/bin/gib
