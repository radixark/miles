name: Doc polish
description: Flag a wording, formatting, or accuracy issue on a docs page. The Mintlify "Raise issue" footer link uses this template.
title: "docs: "
labels: ["doc-polish"]
body:
  - type: input
    id: page
    attributes:
      label: Page URL
      description: Link to the affected page (the Mintlify "Raise issue" button pre-fills this).
      placeholder: https://www.radixark.com/miles/docs/...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's wrong
      description: One or two lines is fine. Quote the affected text if it helps.
      placeholder: e.g. "Sentence starts with an inline code block." or "Accordion title still renders backticks literally."
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Suggested fix (optional)
      description: If you already have a phrasing in mind, drop it here. Skip otherwise.
