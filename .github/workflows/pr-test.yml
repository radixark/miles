name: PR Test

on:
  pull_request:
    types: [synchronize, labeled]
  workflow_dispatch:
    inputs:
      infinite_run:
        description: 'Run training infinitely'
        required: false
        type: boolean
        default: false
      ci_megatron_pr:
        description: 'Megatron-LM branch/commit (default: miles-main)'
        required: false
        type: string
        default: 'miles-main'
      ci_sglang_pr:
        description: 'SGLang branch/commit (default: sglang-miles)'
        required: false
        type: string
        default: 'sglang-miles'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# PR labels are passed through to run_suite.py as raw `run-ci-<X>` strings via
# `--labels`. run_suite.py strips the `run-ci-` prefix internally and ignores
# any label that does not start with `run-ci-` (see tests/ci/run_suite.py
# `strip_run_ci_prefix`). For `workflow_dispatch`, no PR labels exist, so the
# `--labels` list collapses to empty; `--match-all-labels` is then added
# unconditionally to bypass the labels predicate inside run_suite.py and run
# every enabled test in the suite.

jobs:
  # Stage A: CPU-only fast tests (always runs on PR)
  # Runs on GitHub-hosted ubuntu-latest (cpu_runner: true) to avoid
  # occupying GPU-fleet runner slots.
  stage-a-cpu:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request)
    uses: ./.github/workflows/_run-ci.yml
    with:
      cpu_runner: true
      execute_command: >-
        python tests/ci/run_suite.py --hw cpu --suite stage-a-cpu
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  # Stage A: Unit test (single FSDP test, 8 GPU)
  stage-a-unit-test:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-unit-test'))
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h100", "8gpu"]'
      execute_command: "pytest tests/e2e/fsdp/test_qwen3_4B_fsdp_true_on_policy.py -x -v"
    secrets: inherit

  # Stage B: CPU-only bucket (currently empty; reserved for future CPU tests
  # that don't fit stage-a-cpu's fast budget). Always runs on PR. Empty result
  # exits 0 in run_suite.py (see tests/ci/run_suite.py L149-L151).
  stage-b-cpu:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request)
    uses: ./.github/workflows/_run-ci.yml
    with:
      cpu_runner: true
      execute_command: >-
        python tests/ci/run_suite.py --hw cpu --suite stage-b-cpu
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  # Stage B: 8-GPU H100 always-run tests (fast GPU smoke; e.g. quantizer
  # and rollout integration). Every test registered to this suite carries
  # `labels=[]`, so run_suite.py's predicate runs them on every PR.
  # `needs: [stage-a-cpu]` preserves CPU-gates-GPU sequencing; no partition.
  stage-b-8-gpu-h100:
    needs: [stage-a-cpu]
    if: |
      always() && !failure() && !cancelled() &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h100", "8gpu"]'
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-b-8-gpu-h100
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  # Stage C: 8-GPU H100 tests (2 partitions). Runs every PR; the labels
  # predicate inside run_suite.py controls which tests actually execute.
  # `needs: [stage-a-cpu]` preserves today's CPU-gates-GPU sequencing.
  stage-c-8-gpu-h100:
    needs: [stage-a-cpu]
    if: |
      always() && !failure() && !cancelled() &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    strategy:
      fail-fast: false
      matrix:
        partition_id: [0, 1]
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h100", "8gpu"]'
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-c-8-gpu-h100
        --auto-partition-id ${{ matrix.partition_id }} --auto-partition-size 2
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  # Stage C: 4-GPU H200 tests. This stage hosts ONLY tests that are statically
  # sized for <=4 GPUs; the world_size <=4 budget is enforced by
  # tests/utils/test_gpu_cardinality_lint.py. Tests that previously branched on
  # a runtime env var to dynamically shrink to <=4 GPUs have been migrated to
  # `stage-c-8-gpu-h100` and run with the 8-GPU branch unconditionally.
  #
  # The H200 fleet is one physical 8-GPU node split into two 4-GPU self-hosted
  # workers (worker-1 pinned to GPUs 0-3, worker-2 to 4-7) via runner-launch-time
  # CUDA_VISIBLE_DEVICES set in the runner container's compose environment; the
  # bare `--env CUDA_VISIBLE_DEVICES` flag in _run-ci.yml's container.options
  # inherits that value into the inner job container, giving each worker
  # CUDA-level visibility into its disjoint 4-GPU subset. `runs_on` requires
  # BOTH the `h200` hw-type label and the `4gpu` gpu-count label simultaneously,
  # so H100 work can't accidentally land here. The host-side /data/miles_ci is
  # canonical on every CI host (see tests/ci/skills/setup-ci-host); _run-ci.yml
  # mounts that literal path.
  stage-c-4-gpu-h200:
    needs: [stage-a-cpu]
    if: |
      always() && !failure() && !cancelled() &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    strategy:
      fail-fast: false
      matrix:
        # 4 partitions on 2 workers: each worker runs 2 partitions sequentially.
        # Same total wall time as 2 partitions (bounded by the longest single
        # test, currently test_session_server_multi_role.py at 9600s), but
        # smaller retry blast radius. Will collapse back when that long test
        # is split in a follow-up PR.
        partition_id: [0, 1, 2, 3]
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h200", "4gpu"]'
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-c-4-gpu-h200
        --auto-partition-id ${{ matrix.partition_id }} --auto-partition-size 4
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit
