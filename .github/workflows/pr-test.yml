name: PR Test

on:
  pull_request:
    branches: [main]
    types: [synchronize, labeled]
  workflow_dispatch:
    inputs:
      infinite_run:
        description: 'Run training infinitely'
        required: false
        type: boolean
        default: false
      ci_megatron_pr:
        description: 'Megatron-LM branch/commit (default: miles-main)'
        required: false
        type: string
        default: 'miles-main'
      ci_sglang_pr:
        description: 'SGLang branch/commit (default: sglang-miles)'
        required: false
        type: string
        default: 'sglang-miles'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Stage A: CPU-only fast tests (always runs on PR)
  stage-a-fast:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request)
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 0
      execute_command: "pytest tests/fast/ -x -v"
    secrets: inherit

  # Stage B: SGLang patch tests (1 GPU)
  stage-b-sglang:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-sglang'))
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 1
      execute_command: "pytest tests/e2e/sglang_patch/test_chat_input_ids_equivalence.py -x -v"
    secrets: inherit

  # Stage B: Short 8-GPU tests
  stage-b-short:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-short'))
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 8
      execute_command: "python tests/ci/run_suite.py --hw cuda --suite stage-b-short-8-gpu"
    secrets: inherit

  # Stage C: FSDP 8-GPU tests
  stage-c-fsdp:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-fsdp'))
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 8
      execute_command: "python tests/ci/run_suite.py --hw cuda --suite stage-c-fsdp-8-gpu"
    secrets: inherit

  # Stage C: Megatron 8-GPU tests (3 partitions)
  stage-c-megatron:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-megatron'))
    strategy:
      fail-fast: false
      matrix:
        partition_id: [0, 1, 2]
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 8
      execute_command: "python tests/ci/run_suite.py --hw cuda --suite stage-c-megatron-8-gpu --auto-partition-id ${{ matrix.partition_id }} --auto-partition-size 3"
    secrets: inherit

  # Stage C: Precision 8-GPU tests
  stage-c-precision:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-precision'))
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 8
      execute_command: "python tests/ci/run_suite.py --hw cuda --suite stage-c-precision-8-gpu"
    secrets: inherit

  # Stage C: Checkpoint 8-GPU tests
  stage-c-ckpt:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-ckpt'))
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 8
      execute_command: "python tests/ci/run_suite.py --hw cuda --suite stage-c-ckpt-8-gpu"
    secrets: inherit

  # Stage C: Long 8-GPU tests
  stage-c-long:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-long'))
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 8
      execute_command: "python tests/ci/run_suite.py --hw cuda --suite stage-c-long-8-gpu"
    secrets: inherit

  # Stage C: LoRA 8-GPU tests
  stage-c-lora:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-lora'))
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 8
      execute_command: "python tests/ci/run_suite.py --hw cuda --suite stage-c-lora-8-gpu"
    secrets: inherit

  # Stage C: All suites (triggered by run-ci-image label)
  stage-c-all:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-ci-image'))
    strategy:
      fail-fast: false
      matrix:
        suite:
          - stage-c-fsdp-8-gpu
          - stage-c-megatron-8-gpu
          - stage-c-precision-8-gpu
          - stage-c-ckpt-8-gpu
          - stage-c-long-8-gpu
          - stage-c-lora-8-gpu
          - stage-b-short-8-gpu
    uses: ./.github/workflows/_run-ci.yml
    with:
      gpu_count: 8
      execute_command: "python tests/ci/run_suite.py --hw cuda --suite ${{ matrix.suite }}"
    secrets: inherit
