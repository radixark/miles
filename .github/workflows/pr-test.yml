name: PR Test

on:
  pull_request:
    types: [synchronize, labeled]
  workflow_dispatch:
    inputs:
      infinite_run:
        description: 'Run training infinitely'
        required: false
        type: boolean
        default: false
      ci_megatron_pr:
        description: 'Megatron-LM branch/commit (default: miles-main)'
        required: false
        type: string
        default: 'miles-main'
      ci_sglang_pr:
        description: 'SGLang branch/commit (default: sglang-miles)'
        required: false
        type: string
        default: 'sglang-miles'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# PR labels are passed through to run_suite.py as raw `run-ci-<X>` strings via
# `--labels`. run_suite.py strips the `run-ci-` prefix internally and ignores
# any label that does not start with `run-ci-` (see tests/ci/run_suite.py
# `strip_run_ci_prefix`). For `workflow_dispatch`, no PR labels exist, so the
# `--labels` list collapses to empty; `--match-all-labels` is then added
# unconditionally to bypass the labels predicate inside run_suite.py and run
# every enabled test in the suite.

jobs:
  # Stage A: CPU-only fast tests (always runs on PR)
  # Runs on GitHub-hosted ubuntu-latest (cpu_runner: true) to avoid
  # occupying GPU-fleet runner slots.
  stage-a-cpu:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request)
    uses: ./.github/workflows/_run-ci.yml
    with:
      cpu_runner: true
      execute_command: >-
        python tests/ci/run_suite.py --hw cpu --suite stage-a-cpu
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  # Stage A: Unit test (single FSDP test, 8 GPU)
  stage-a-unit-test:
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request && contains(github.event.pull_request.labels.*.name, 'run-unit-test'))
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h100", "8gpu"]'
      execute_command: "pytest tests/e2e/fsdp/test_qwen3_4B_fsdp_true_on_policy.py -x -v"
    secrets: inherit

  # Stage B: CPU-only bucket (currently empty; reserved for future CPU tests
  # that don't fit stage-a-cpu's fast budget). Always runs on PR. Empty result
  # exits 0 in run_suite.py (see tests/ci/run_suite.py L149-L151).
  stage-b-cpu:
    if: (github.event_name == 'workflow_dispatch') || (github.event.pull_request)
    uses: ./.github/workflows/_run-ci.yml
    with:
      cpu_runner: true
      execute_command: >-
        python tests/ci/run_suite.py --hw cpu --suite stage-b-cpu
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

 
  stage-b-2-gpu-h200:
    needs: [stage-a-cpu]
    if: |
      always() && !failure() && !cancelled() &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h200", "2gpu"]'
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-b-2-gpu-h200
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit


  stage-c-8-gpu-h100:
    needs: [stage-a-cpu]
    if: |
      always() && !failure() && !cancelled() &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    strategy:
      fail-fast: false
      matrix:
        partition_id: [0, 1]
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h100", "8gpu"]'
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-c-8-gpu-h100
        --auto-partition-id ${{ matrix.partition_id }} --auto-partition-size 2
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit


  stage-c-4-gpu-h200:
    needs: [stage-a-cpu]
    if: |
      always() && !failure() && !cancelled() &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    strategy:
      fail-fast: false
      matrix:
        partition_id: [0, 1, 2]
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h200", "4gpu"]'
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-c-4-gpu-h200
        --auto-partition-id ${{ matrix.partition_id }} --auto-partition-size 3
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit

  stage-c-2-gpu-h200:
    needs: [stage-a-cpu]
    if: |
      always() && !failure() && !cancelled() &&
      ((github.event_name == 'workflow_dispatch') || (github.event.pull_request))
    strategy:
      fail-fast: false
      matrix:
        partition_id: [0, 1]
    uses: ./.github/workflows/_run-ci.yml
    with:
      runs_on: '["h200", "2gpu"]'
      execute_command: >-
        python tests/ci/run_suite.py --hw cuda --suite stage-c-2-gpu-h200
        --auto-partition-id ${{ matrix.partition_id }} --auto-partition-size 2
        --labels ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        ${{ (github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-ci-image') || contains(github.event.pull_request.labels.*.name, 'run-ci-all')) && '--match-all-labels' || '' }}
    secrets: inherit
