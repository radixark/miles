# Cross-tokenizer on-policy distillation on Kubernetes:
#   GLM5.2 teacher  ->  Qwen3.6-35B-A3B student.
#
# TOPOLOGY (the runnable, primary artifact): TWO nodes, one role each.
#   * will-glm52-teacher  Deployment + Service: SGLang server for the 744B-A40B
#     GLM5.2 teacher on one 8xH200 node (TP=8, FP8, intra-node NVLink). Queried for
#     per-token logprobs only (max_new_tokens=0), so it never generates.
#   * will-qwen36-trainer Job: the Qwen3.6-35B-A3B student, colocated train+rollout
#     on the OTHER 8xH200 node (EP=8). Reaches the teacher over HTTP at
#     http://will-glm52-teacher:30000/generate.
#
# WHY TWO NODES (not single-Pod/two-container): a 744B-A40B teacher needs a whole
# 8xH200 node to serve and the 35B-A3B student needs a whole node to train+roll out,
# so 8+8 GPUs cannot co-fit on one 8-GPU node. The two roles only exchange HTTP
# scoring requests over the pod network, so each role is single-node internally
# (NVLink) and NO RDMA/IB or multi-node NCCL is required.
#
# Scheduling: priorityClassName skypilot-high-priority (preempts lower-priority GPU
# pods) so the two nodes get allocated on a busy cluster.
#
# Storage: reuses the RWX `weka-data` PVC (32Ti) for the HF cache, model weights,
# the torch_dist checkpoint, run checkpoints, AND the staged feature-branch code at
# /weka/code/miles (pre-staged so no GitHub push is needed; falls back to git clone).
#
# Smoke-then-full: the trainer honors NUM_ROLLOUT — set it small (e.g. 3) for a
# wiring smoke, then re-apply with the default for the full run.
---
apiVersion: v1
kind: Service
metadata:
  name: will-glm52-teacher
  labels: { app: will-glm52-teacher }
spec:
  selector: { app: will-glm52-teacher }
  ports:
    - name: http
      port: 30000
      targetPort: 30000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: will-glm52-teacher
  labels: { app: will-glm52-teacher }
spec:
  replicas: 1
  selector:
    matchLabels: { app: will-glm52-teacher }
  template:
    metadata:
      labels: { app: will-glm52-teacher }
    spec:
      restartPolicy: Always
      priorityClassName: skypilot-high-priority
      # Keep the teacher and trainer on different nodes (each wants a full 8-GPU node).
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: will-qwen36-trainer }
              topologyKey: kubernetes.io/hostname
      volumes:
        - name: weka
          persistentVolumeClaim: { claimName: weka-data }
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 64Gi }
      containers:
        - name: teacher
          image: radixark/miles:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TEACHER_MODEL
              value: "zai-org/GLM-5.2-FP8"       # pre-quantized block-FP8 (~750GB); loads ~94GB/GPU on 8xH200
            - name: HF_HOME
              value: /weka/hf
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef: { name: hf-token, key: HF_TOKEN, optional: true }
          command: ["bash", "-lc"]
          args:
            - |
              set -ex
              MODEL_DIR=/weka/models/glm5.2-fp8
              if [ ! -e "$MODEL_DIR/config.json" ]; then
                hf download "$TEACHER_MODEL" --local-dir "$MODEL_DIR"
              fi
              # Pre-quantized block-FP8 (config has quant_method=fp8, weight_block_size
              # [128,128]); SGLang auto-detects it and loads FP8 directly (~94GB/GPU), so no
              # --quantization flag (online fp8 would load bf16 first and OOM). glm_moe_dsa
              # (DeepSeek-V3.2-style DSA) attention is handled by SGLang's native loader.
              exec python3 -m sglang.launch_server \
                --model-path "$MODEL_DIR" \
                --tp 8 \
                --host 0.0.0.0 --port 30000 \
                --mem-fraction-static 0.85 \
                --chunked-prefill-size 8192 \
                --trust-remote-code
          ports:
            - containerPort: 30000
          readinessProbe:
            httpGet: { path: /health_generate, port: 30000 }
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 240
          resources:
            limits:
              nvidia.com/gpu: "8"
              cpu: "32"
              memory: 512Gi
          volumeMounts:
            - { name: weka, mountPath: /weka }
            - { name: dshm, mountPath: /dev/shm }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: will-qwen36-trainer
  labels: { app: will-qwen36-trainer }
spec:
  backoffLimit: 0
  template:
    metadata:
      labels: { app: will-qwen36-trainer }
    spec:
      restartPolicy: Never
      priorityClassName: skypilot-high-priority
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels: { app: will-glm52-teacher }
              topologyKey: kubernetes.io/hostname
      volumes:
        - name: weka
          persistentVolumeClaim: { claimName: weka-data }
        - name: dshm
          emptyDir: { medium: Memory, sizeLimit: 128Gi }
      containers:
        - name: trainer
          image: radixark/miles:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: STUDENT_MODEL_ID
              value: "Qwen/Qwen3.6-35B-A3B"
            - name: TEACHER_TOKENIZER
              value: "zai-org/GLM-5.2-FP8"         # tokenizer == GLM-5.2; only tokenizer files pulled
            - name: RM_URL
              value: "http://will-glm52-teacher:30000/generate"
            - name: NUM_ROLLOUT
              value: "1000"                        # set to e.g. "3" for a wiring smoke first
            - name: GIT_REPO
              value: "https://github.com/williammtan/miles"
            - name: GIT_REF
              value: "feat/cross-tokenizer-opd"
            - name: HF_HOME
              value: /weka/hf
            - name: HF_HUB_ENABLE_HF_TRANSFER
              value: "1"
            - name: MEGATRON_PATH
              value: /root/Megatron-LM
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef: { name: hf-token, key: HF_TOKEN, optional: true }
          command: ["bash", "-lc"]
          args:
            - |
              set -ex
              CODE_DIR=/weka/code/miles
              # Prefer pre-staged code (no GitHub push needed); else clone the branch.
              if [ ! -f "$CODE_DIR/setup.py" ]; then
                git clone "$GIT_REPO" "$CODE_DIR" && cd "$CODE_DIR" && git checkout "$GIT_REF"
              fi
              cd "$CODE_DIR"
              # --no-deps: install our code editable without re-resolving the image's
              # pinned sglang/megatron/torch (a full resolve breaks SGLang's kernel match).
              pip install -e . --no-deps >/dev/null 2>&1 || true

              STUDENT_DIR=/weka/models/qwen3.6-35B-A3B
              if [ ! -e "$STUDENT_DIR/config.json" ]; then
                hf download "$STUDENT_MODEL_ID" --local-dir "$STUDENT_DIR"
              fi
              export STUDENT_MODEL="$STUDENT_DIR"
              export STUDENT_TORCH_DIST=/weka/models/qwen3.6-35B-A3B_torch_dist
              export DATA_PATH=/weka/data/dapo-math-17k/dapo-math-17k.jsonl
              if [ ! -e "$DATA_PATH" ]; then
                hf download --repo-type dataset zhuzilin/dapo-math-17k --local-dir /weka/data/dapo-math-17k
              fi

              # Waits for the teacher's /health_generate, converts the student to
              # torch_dist if needed, then launches colocated train+rollout.
              exec bash examples/on_policy_distillation/run-qwen3.6-35B-A3B-glm5.2-cross-tokenizer.sh
          resources:
            limits:
              nvidia.com/gpu: "8"
              cpu: "64"
              memory: 1024Gi
          volumeMounts:
            - { name: weka, mountPath: /weka }
            - { name: dshm, mountPath: /dev/shm }
#
# ---------------------------------------------------------------------------
# SINGLE-POD, TWO-CONTAINER VARIANT (only if the teacher co-fits on one node):
# Replace the Deployment+Service+Job above with one Pod whose `teacher` and
# `trainer` containers share /dev/shm and the PVC; the trainer then uses
# RM_URL=http://localhost:30000/generate. This needs teacher_gpus + student_gpus
# <= 8, so it is NOT usable for the 744B GLM5.2 teacher — only for a small teacher.
# ---------------------------------------------------------------------------
