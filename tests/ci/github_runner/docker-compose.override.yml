# Per-host runner overrides. Every CI host is expected to provide
# /data/miles_ci as a real directory or as a symlink to the host's big disk;
# tests/ci/skills/setup-ci-host/setup-host.sh automates this (df probe +
# symlink) and should be run on the host before `docker compose up -d`.
#
# The /data/miles_ci bind mount uses the same path on both sides. Splitting
# host vs container would break docker-out-of-docker path forwarding (see the
# comment in docker-compose.yml).
#
# Per-runner CUDA_VISIBLE_DEVICES gives each H200 worker a disjoint CUDA-level
# slice of the host's 8 GPUs. The driver-level visibility is intentionally left
# at --gpus all (set in .github/workflows/_run-ci.yml's container.options) so
# the inner job container's nvidia-smi -L still shows the full host hardware;
# CUDA-level partitioning is sufficient because miles tests respect CVD.
services:
  runner:
    deploy:
      replicas: 0
    profiles:
      - disabled

  scitix-72-0:
    image: ghcr.io/actions/actions-runner:2.334.0
    container_name: scitix-72-0
    hostname: scitix-72-0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/miles_ci:/data/miles_ci
      - /home/runner/externals:/home/runner/externals
    restart: always
    environment:
      RUNNER_ALLOW_RUNASROOT: "1"
      CUDA_VISIBLE_DEVICES: "0,1,2,3"
    privileged: true
    user: root
    entrypoint:
      - sh
      - -c
      - |
        cd /data/miles_ci && \
        if [ ! -f /home/runner/.runner ]; then \
          /home/runner/config.sh --url ${GITHUB_RUNNER_URL} --token ${GITHUB_RUNNER_TOKEN} --name scitix-72-0 --labels gpu-runner,h200,4gpu,scitix-72-0 --unattended --work /data/miles_ci/runner_scitix-72-0 --disableupdate --replace; \
        fi && \
        /home/runner/run.sh

  scitix-72-1:
    image: ghcr.io/actions/actions-runner:2.334.0
    container_name: scitix-72-1
    hostname: scitix-72-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /data/miles_ci:/data/miles_ci
      - /home/runner/externals:/home/runner/externals
    restart: always
    environment:
      RUNNER_ALLOW_RUNASROOT: "1"
      CUDA_VISIBLE_DEVICES: "4,5,6,7"
    privileged: true
    user: root
    entrypoint:
      - sh
      - -c
      - |
        cd /data/miles_ci && \
        if [ ! -f /home/runner/.runner ]; then \
          /home/runner/config.sh --url ${GITHUB_RUNNER_URL} --token ${GITHUB_RUNNER_TOKEN} --name scitix-72-1 --labels gpu-runner,h200,4gpu,scitix-72-1 --unattended --work /data/miles_ci/runner_scitix-72-1 --disableupdate --replace; \
        fi && \
        /home/runner/run.sh
