apiVersion: apps/v1
kind: Deployment
metadata:
  name: ycy-harbor-server
  namespace: nlp-train
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ycy-harbor-server
  template:
    metadata:
      labels:
        app: ycy-harbor-server
    spec:
      # 不要设置 dnsConfig.nameservers 为公网 DNS，否则会破坏集群内 Service DNS
      containers:
      - name: harbor-server
        image: harbor.unisound.ai/unisound/harbor_ycy:latest
        imagePullPolicy: Always
        securityContext:
          privileged: true
        # K8s command 会替换镜像 ENTRYPOINT，显式调用 entrypoint.sh 以启动 DinD + sshd
        command:
        - /usr/local/bin/entrypoint.sh
        args:
        - /bin/bash
        - -c
        - |
          # 优先用挂载目录里的新版 init（含 ~/.local/.cache -> /fs）；镜像 rebuild 前也生效
          if [[ -x /home/yangchengyi/data/miles/code/init-home-symlinks.sh ]]; then
            /home/yangchengyi/data/miles/code/init-home-symlinks.sh
          else
            /usr/local/bin/init-home-symlinks.sh
          fi
          sleep 28d
        ports:
        - name: agent-http
          containerPort: 11000
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: 11000
          initialDelaySeconds: 30
          periodSeconds: 10
        env:
        - name: http_proxy
          value: ""
        - name: https_proxy
          value: ""
        - name: HTTP_PROXY
          value: ""
        - name: HTTPS_PROXY
          value: ""
        - name: no_proxy
          value: localhost,127.0.0.1,::1
        - name: NO_PROXY
          value: localhost,127.0.0.1,::1
        - name: HARBOR_TASKS_DIR
          value: "/fs/nlp-intern/yangchengyi/harbor/datasets/swegym"
        - name: DATA_LINK_SRC
          value: "/fs/nlp-intern/yangchengyi"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        resources:
          limits:
            cpu: 16
            memory: 200Gi
        volumeMounts:
        - name: jfs
          mountPath: /fs
        - name: home
          mountPath: /home/yangchengyi
        - name: dshm
          mountPath: /dev/shm
        - name: docker-storage
          mountPath: /var/lib/docker
      volumes:
      - name: jfs
        hostPath:
          path: /fs
      - name: home
        hostPath:
          path: /home/yangchengyi
      - name: dshm
        emptyDir: { medium: Memory, sizeLimit: 64Gi }
      - name: docker-storage
        emptyDir: {}
---
# 集群内访问：http://agent-env.nlp-intern.svc.cluster.local:11000
# jzgpu17 上 port-forward：kubectl port-forward -n nlp-train deploy/ycy-harbor-server 11000:11000
# jzgpu17 上 NodePort：curl http://<任意节点IP>:31100/health
apiVersion: v1
kind: Service
metadata:
  name: agent-env
  namespace: nlp-train
spec:
  type: NodePort
  selector:
    app: ycy-harbor-server
  ports:
  - name: http
    port: 11000
    targetPort: 11000
    nodePort: 31100
