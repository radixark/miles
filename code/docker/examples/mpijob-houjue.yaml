# 多机训练任务模板（参考手册 mpi-example.yaml）
# 说明：
#   - 该 yaml 在调试机 jzgpu17 上执行 `kubectl apply -f` 提交
#   - sshAuthMountPath 必须为 /home/<ldap>/.ssh
#   - Worker.lifecycle.postStart 启动 sshd（手册 FAQ #1）
#   - 多机时 worker 必须配 nvidia.com/hostdev: 10
#   - cpu 必须整数；memory ≤ 1024Gi（建议 500–900Gi）
#   - nlp-intern 当前 GPU 配额 24，已用 18 → 单提一台 8 卡机就够了
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: houjue-job
  namespace: nlp-intern
spec:
  slotsPerWorker: 8
  runPolicy:
    cleanPodPolicy: Running
  sshAuthMountPath: /home/houjue/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          dnsConfig:
            nameservers: [223.5.5.5, 114.114.114.114]
          containers:
            - name: mpi-launcher
              image: harbor.unisound.ai/unisound/houjue-dev:v20260514
              securityContext: { privileged: false }
              lifecycle:
                postStart:
                  exec:
                    command: ["/bin/bash", "-c", "sudo /etc/init.d/ssh start"]
              command: ["/bin/bash", "-c"]
              args:
                - |
                  # 改成你的实际训练入口，例如 mpirun 启动脚本
                  bash /fs/nlp-intern/houjue/code/mpirun_houjue.sh
              volumeMounts:
                - { name: jfs, mountPath: /fs }
          volumes:
            - name: jfs
              hostPath: { path: /fs }

    Worker:
      replicas: 1 # 节点数；2 机就改 2
      template:
        spec:
          dnsConfig:
            nameservers: [223.5.5.5, 114.114.114.114]
          containers:
            - name: mpi-worker
              image: harbor.unisound.ai/unisound/houjue-dev:v20260514
              securityContext: { privileged: true }
              lifecycle:
                postStart:
                  exec:
                    command: ["/bin/bash", "-c", "sudo /etc/init.d/ssh start"]
              command: ["/bin/sh", "-c"]
              args: ["sleep 7d"]
              resources:
                limits:
                  cpu: 16
                  memory: 500Gi
                  nvidia.com/gpu: 8
                  # 多机任务（replicas>1）才需要打开下面这行：
                  # nvidia.com/hostdev: 10
              volumeMounts:
                - { name: jfs, mountPath: /fs }
                - { name: dshm, mountPath: /dev/shm }
          volumes:
            - name: jfs
              hostPath: { path: /fs }
            - name: dshm
              emptyDir: { medium: Memory, sizeLimit: 64Gi }
