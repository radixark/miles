# Per-host runner overrides. Each host's .env file should set DATA_ROOT to
# the path of the real CI data tree on that host (e.g. /data on scitix-72,
# /mnt/nvme0n1 on novita). DATA_ROOT is used identically on both sides of the
# bind mount and in the runner's --work flag — splitting it across host vs
# container would break docker-out-of-docker path forwarding (see the comment
# in docker-compose.yml).
#
# Per-runner CUDA_VISIBLE_DEVICES gives each H200 worker a disjoint CUDA-level
# slice of the host's 8 GPUs. The driver-level visibility is intentionally left
# at --gpus all (set in .github/workflows/_run-ci.yml's container.options) so
# the inner job container's nvidia-smi -L still shows the full host hardware;
# CUDA-level partitioning is sufficient because miles tests respect CVD.
services:
  runner:
    deploy:
      replicas: 0
    profiles:
      - disabled

  scitix-72-0:
    image: ghcr.io/actions/actions-runner:2.334.0
    container_name: scitix-72-0
    hostname: scitix-72-0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_ROOT:-/data}/miles_ci:${DATA_ROOT:-/data}/miles_ci
      - /home/runner/externals:/home/runner/externals
    restart: always
    environment:
      RUNNER_ALLOW_RUNASROOT: "1"
      CUDA_VISIBLE_DEVICES: "0,1,2,3"
    privileged: true
    user: root
    entrypoint:
      - sh
      - -c
      - |
        cd ${DATA_ROOT:-/data}/miles_ci && \
        if [ ! -f /home/runner/.runner ]; then \
          /home/runner/config.sh --url ${GITHUB_RUNNER_URL} --token ${GITHUB_RUNNER_TOKEN} --name scitix-72-0 --labels gpu-runner,h200,4gpu,scitix-72-0 --unattended --work ${DATA_ROOT:-/data}/miles_ci/runner_scitix-72-0 --disableupdate --replace; \
        fi && \
        /home/runner/run.sh

  scitix-72-1:
    image: ghcr.io/actions/actions-runner:2.334.0
    container_name: scitix-72-1
    hostname: scitix-72-1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATA_ROOT:-/data}/miles_ci:${DATA_ROOT:-/data}/miles_ci
      - /home/runner/externals:/home/runner/externals
    restart: always
    environment:
      RUNNER_ALLOW_RUNASROOT: "1"
      CUDA_VISIBLE_DEVICES: "4,5,6,7"
    privileged: true
    user: root
    entrypoint:
      - sh
      - -c
      - |
        cd ${DATA_ROOT:-/data}/miles_ci && \
        if [ ! -f /home/runner/.runner ]; then \
          /home/runner/config.sh --url ${GITHUB_RUNNER_URL} --token ${GITHUB_RUNNER_TOKEN} --name scitix-72-1 --labels gpu-runner,h200,4gpu,scitix-72-1 --unattended --work ${DATA_ROOT:-/data}/miles_ci/runner_scitix-72-1 --disableupdate --replace; \
        fi && \
        /home/runner/run.sh
